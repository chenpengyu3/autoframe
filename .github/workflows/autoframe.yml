name: AutoFrame CI

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Optional target service URL for an integration AutoFrame run"
        required: false
        default: ""
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    name: Python quality checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Compile
        run: python -m compileall autoframe
      - name: Unit tests
        run: python -m pytest autoframe/modules/ecosystem -q

  integration:
    name: Optional target integration run
    runs-on: ubuntu-latest
    needs: quality
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_url != '' }}
    env:
      AUTOFRAME_BASE_URL: ${{ github.event.inputs.target_url }}
      AUTOFRAME_PROJECT_PATH: ${{ github.workspace }}
      AUTOFRAME_AUTH_TOKEN: ${{ secrets.AUTOFRAME_AUTH_TOKEN }}
      AUTOFRAME_DB_URL: ${{ secrets.AUTOFRAME_DB_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run AutoFrame
        run: python -m autoframe run --url "$AUTOFRAME_BASE_URL" --project "$AUTOFRAME_PROJECT_PATH" --no-report
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autoframe-reports
          path: reports/
