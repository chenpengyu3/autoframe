[pytest]
testpaths = autoframe/modules
asyncio_mode = auto
markers =
    api: API/functional tests
    performance: Performance tests
    security: Security tests
    database: Database tests
    database_matrix: Live database schema matrix tests
    ecosystem: Optional external testing ecosystem integration checks
    contract: OpenAPI and schema contract tests
    concurrency: Concurrency tests
    dast: Passive dynamic application security tests
    source_quality: Source tree quality and configuration hygiene tests
    source_matrix: Source-level dynamic inventory matrix tests
    spring_matrix: Spring Boot source-level inventory matrix tests
    fault_tolerance: Fault tolerance tests
    enterprise: Enterprise-grade scan quality, contract, observability, and special endpoint tests
    endpoint_matrix: Dynamically generated endpoint/resource matrix tests
    validation: Input validation and malformed request tests
    compatibility: HTTP protocol and client compatibility tests
    files: Upload/download and binary endpoint contract tests
    observability: Runtime health, trace, and operational signal tests
    documentation: API documentation and OpenAPI exposure tests
